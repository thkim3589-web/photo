<script>
async function compressImageForExcel(src){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const maxWidth=1280;
      const ratio=Math.min(1,maxWidth/img.width);
      canvas.width=img.width*ratio;
      canvas.height=img.height*ratio;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      canvas.toBlob(blob=>{
        if(blob) resolve(blob);
        else reject(new Error('압축 실패'));
      },'image/jpeg',0.55);
    };
    img.onerror=reject;
    img.src=src;
  });
}
</script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

const manage=document.getElementById("manageNo");

const buttons=document.querySelectorAll(".btn");

function update(){
const ok=manage.value.trim()!=="";
buttons.forEach(btn=>{
    if(btn.id==="backupBtn" || btn.id==="restoreBtn"){
        btn.disabled=false;
        btn.style.opacity="1";
        return;
    }
    btn.disabled=!ok;
    btn.style.opacity=ok?"1":"0.4";
});

    fabCamera.disabled=!ok;
    fabCamera.style.opacity=ok?"1":"0.4";

    const source=new Image();

    source.onload=function(){

        const canvas=document.createElement("canvas");
        const maxWidth=1280;

        const scale=Math.min(1,maxWidth/source.width);

        canvas.width=source.width*scale;
        canvas.height=source.height*scale;

        const ctx=canvas.getContext("2d");
        ctx.drawImage(source,0,0,canvas.width,canvas.height);

        const compressedBase64=canvas.toDataURL("image/jpeg",0.55);

        img.src=compressedBase64;
        card.dataset.base64=compressedBase64;

    };

    source.src=e.target.result;
};

<script>
window.addEventListener('load', function () {
  function calc(){
    const oldNail = Number(document.getElementById('oldNail')?.value || 0);
    const oldSticker = Number(document.getElementById('oldSticker')?.value || 0);
    const crossing = Number(document.getElementById('crossing')?.value || 0);

    const newNail = Number(document.getElementById('newNail')?.value || 0);
    const newSticker = Number(document.getElementById('newSticker')?.value || 0);

    const oldBox = document.getElementById('oldBox');
    const newBox = document.getElementById('newBox');

    if(oldBox) oldBox.value = oldNail + oldSticker;
    if(newBox) newBox.value = newNail + newSticker + crossing;
  }

  ['oldNail','oldSticker','crossing','newNail','newSticker'].forEach(id=>{
    const el = document.getElementById(id);
    if(el){
      el.addEventListener('input', calc);
      el.addEventListener('change', calc);
    }
  });

  calc();
});
</script>

/* 스와이프 준비 */
let currentPhotoIndex=0;
let startX=0;

 if(document.getElementById('photoModal')?.style.display==='flex'){

 const diff=endX-startX;
 const imgs=[...document.querySelectorAll('#galleryGrid .photo-card img')];
 if(Math.abs(diff)>50 && imgs.length){
   currentPhotoIndex += diff<0 ? 1 : -1;
   if(currentPhotoIndex<0) currentPhotoIndex=imgs.length-1;
   if(currentPhotoIndex>=imgs.length) currentPhotoIndex=0;
   const m=document.getElementById('modalImg');

  m.src=imgs[currentPhotoIndex].src;
  const info=document.getElementById('photoIndexInfo');

}
 }
},{passive:true});

/* 핀치줌 기본 */
let scale=1;
const modalImgGetter=()=>document.getElementById('modalImg');
document.addEventListener('wheel',e=>{

 if(!img) return;
 scale += e.deltaY<0 ? 0.1 : -0.1;

 img.style.transform='scale('+scale+')';

document.addEventListener('DOMContentLoaded',()=>{
 const gallery=document.getElementById('galleryGrid');
 if(!gallery) return;

 let dragItem=null;

 gallery.addEventListener('dragstart',e=>{
   const card=e.target.closest('.photo-card');
   if(!card) return;
   dragItem=card;
 });

 gallery.addEventListener('dragover',e=>{
   e.preventDefault();
   const target=e.target.closest('.photo-card');
   if(!target || target===dragItem) return;

   const rect=target.getBoundingClientRect();
   const next=(e.clientY-rect.top) > rect.height/2;
   gallery.insertBefore(dragItem,next?target.nextSibling:target);
 });

 gallery.querySelectorAll('.photo-card').forEach(card=>{
   card.draggable=true;
 });

 const observer=new MutationObserver(()=>{
   gallery.querySelectorAll('.photo-card').forEach(card=>{
      card.draggable=true;
   });
   if(typeof renumberPhotosV506==='function') renumberPhotosV506();
 });
 observer.observe(gallery,{childList:true});
});
</script>
